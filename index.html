<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rancho Park</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#16241C;
    --surface:#1E3128;
    --surface-2:#243A2F;
    --text:#F2EEE1;
    --text-secondary:#AEB8A9;
    --ember:#D98F3B;
    --water:#4FA9A6;
    --border:rgba(242,238,225,0.14);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{
    background:var(--bg);
    color:var(--text);
    font-family:'Manrope',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;letter-spacing:-0.01em;}
  .screen{display:none;min-height:100vh;padding-bottom:96px;}
  .screen.active{display:block;}

  /* ---- hero ---- */
  .hero{padding:28px 20px 20px;position:relative;}
  .hero h1{font-size:30px;color:var(--text);}
  .hero p{color:var(--text-secondary);font-size:14px;margin-top:6px;}
  .ripple{width:100%;height:14px;margin-top:18px;}
  .ripple path{stroke:var(--water);stroke-width:2;fill:none;opacity:0.6;}

  /* ---- gallery strip ---- */
  .gallery{display:flex;gap:10px;padding:4px 20px 18px;overflow-x:auto;}
  .gallery::-webkit-scrollbar{display:none;}
  .gallery .thumb{
    flex:0 0 auto;width:96px;height:96px;
    background:var(--surface-2);
    border-radius:40% 60% 62% 38% / 55% 35% 65% 45%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;color:var(--text-secondary);text-align:center;padding:8px;
  }

  /* ---- section cards ---- */
  .list{padding:4px 20px 20px;display:flex;flex-direction:column;gap:10px;}
  .card{
    background:var(--surface);
    border:0.5px solid var(--border);
    border-radius:14px;
    padding:16px;
    display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;
  }
  .card .title{font-size:15px;font-weight:500;color:var(--text);}
  .card .sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
  .card .arrow{color:var(--text-secondary);font-size:18px;}
  .card.muted{opacity:0.55;}
  .badge{font-size:10px;background:rgba(217,143,59,0.18);color:var(--ember);padding:3px 8px;border-radius:8px;}

  /* ---- detail screen ---- */
  .detail-photo{
    height:200px;margin:0 20px 16px;border-radius:16px;
    background:var(--surface-2);
    display:flex;align-items:center;justify-content:center;
    color:var(--text-secondary);font-size:13px;text-align:center;padding:12px;
  }
  .detail-body{padding:0 20px;}
  .detail-body h2{font-size:22px;margin-bottom:8px;}
  .detail-body p{font-size:14px;line-height:1.6;color:var(--text-secondary);white-space:pre-line;}

  /* ---- top bar ---- */
  .topbar{display:flex;align-items:center;gap:12px;padding:20px 20px 4px;}
  .back-btn{
    width:34px;height:34px;border-radius:50%;
    background:var(--surface);border:0.5px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    color:var(--text);font-size:16px;cursor:pointer;
  }
  .topbar .label{font-size:13px;color:var(--text-secondary);}

  /* ---- form ---- */
  .form{padding:8px 20px;display:flex;flex-direction:column;gap:14px;}
  .field label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:6px;}
  .field input{
    width:100%;height:44px;border-radius:10px;
    border:0.5px solid var(--border);background:var(--surface);
    color:var(--text);font-size:14px;padding:0 14px;font-family:'Manrope',sans-serif;
  }
  .field input:focus{outline:none;border-color:var(--water);}
  .submit-btn{
    margin-top:6px;height:48px;border-radius:12px;border:none;
    background:var(--ember);color:#241305;font-size:15px;font-weight:700;
    font-family:'Manrope',sans-serif;cursor:pointer;
  }
  .success{padding:60px 24px;text-align:center;}
  .success .icon{font-size:40px;margin-bottom:12px;}
  .success h2{font-size:20px;margin-bottom:8px;}
  .success p{color:var(--text-secondary);font-size:14px;}

  /* ---- bottom cta ---- */
  .bottom-cta{
    position:fixed;left:0;right:0;bottom:0;
    padding:14px 20px 22px;
    background:linear-gradient(to top, var(--bg) 60%, transparent);
  }
  .bottom-cta button{
    width:100%;height:48px;border-radius:12px;border:none;
    background:var(--ember);color:#241305;font-size:15px;font-weight:700;
    font-family:'Manrope',sans-serif;cursor:pointer;
  }
</style>
</head>
<body>

<!-- ===================== HOME ===================== -->
<div class="screen active" id="screen-home">
  <div class="hero">
    <h1>Rancho park</h1>
    <p>Аквапарк · батути · контактний зоопарк · чан · альтанки</p>
    <svg class="ripple" viewBox="0 0 300 14"><path d="M0 7 Q 15 0, 30 7 T 60 7 T 90 7 T 120 7 T 150 7 T 180 7 T 210 7 T 240 7 T 270 7 T 300 7"/></svg>
  </div>

  <div class="gallery">
    <div class="thumb">фото<br>аквапарк</div>
    <div class="thumb">фото<br>батути</div>
    <div class="thumb">фото<br>олені</div>
    <div class="thumb">фото<br>чан</div>
    <div class="thumb">фото<br>альтанки</div>
  </div>

  <div class="list" id="section-list"></div>

  <div class="bottom-cta">
    <button onclick="showScreen('screen-form')">Зв'язатися з адміністратором</button>
  </div>
</div>

<!-- ===================== DETAIL ===================== -->
<div class="screen" id="screen-detail">
  <div class="topbar">
    <div class="back-btn" onclick="showScreen('screen-home')">←</div>
    <div class="label">Rancho park</div>
  </div>
  <div class="detail-photo" id="detail-photo">фото розділу — додається пізніше</div>
  <div class="detail-body">
    <h2 id="detail-title"></h2>
    <p id="detail-text"></p>
  </div>
</div>

<!-- ===================== CONTACT FORM ===================== -->
<div class="screen" id="screen-form">
  <div class="topbar">
    <div class="back-btn" onclick="showScreen('screen-home')">←</div>
    <div class="label">Заявка адміністратору</div>
  </div>
  <div class="form">
    <div class="field">
      <label>На яку дату?</label>
      <input id="f-date" type="text" placeholder="напр. 20 липня">
    </div>
    <div class="field">
      <label>Кількість осіб</label>
      <input id="f-people" type="number" min="1" placeholder="напр. 4">
    </div>
    <div class="field">
      <label>Телефон для зв'язку</label>
      <input id="f-phone" type="tel" placeholder="+380...">
    </div>
    <button class="submit-btn" onclick="submitForm()">Надіслати заявку</button>
  </div>
</div>

<!-- ===================== SUCCESS ===================== -->
<div class="screen" id="screen-success">
  <div class="success">
    <div class="icon">🌿</div>
    <h2>Заявку надіслано</h2>
    <p>Адміністратор скоро з вами зв'яжеться.</p>
  </div>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }

const SECTIONS = [
  {key:"aquapark", title:"Аквапарк і басейни", sub:"Графік, ціни", text:"Графік роботи: 10:00–20:00 щодня\nЦіна: 350 грн / дорослий, 200 грн / дитина\n\nВідкриті та закриті басейни, гірки для дітей і дорослих."},
  {key:"trampolines", title:"Батути", sub:"Правила, вік", text:"Вік: від 3 років (діти до 7 — тільки з дорослим)\nЦіна: 250 грн / година"},
  {key:"zoo", title:"Контактний зоопарк", sub:"Олені, годування", text:"Олені та інші тварини, можна годувати (корм продається на місці — 50 грн)."},
  {key:"chan", title:"Чан на дровах", sub:"Оренда, температура", text:"Оренда: 1000 грн / 2 години (до 6 осіб)\nПотрібна попередня заявка адміністратору."},
  {key:"gazebo", title:"Альтанки в оренду", sub:"Місткість, ціна", text:"Місткість: 6–10 осіб\nЦіна: 400 грн / година"},
  {key:"menu", title:"Меню кафе", sub:"Перегляд · замовлення скоро", text:"Онлайн-замовлення поки недоступне — меню можна переглянути на місці або запитати в адміністратора.", muted:true}
];

function renderList(){
  const list = document.getElementById("section-list");
  list.innerHTML = SECTIONS.map(s => `
    <div class="card ${s.muted ? 'muted' : ''}" onclick="openDetail('${s.key}')">
      <div>
        <div class="title">${s.title}</div>
        <div class="sub">${s.sub}</div>
      </div>
      ${s.muted ? '<span class="badge">план</span>' : '<span class="arrow">›</span>'}
    </div>
  `).join("");
}
renderList();

function showScreen(id){
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openDetail(key){
  const s = SECTIONS.find(x => x.key === key);
  if (!s) return;
  document.getElementById("detail-title").textContent = s.title;
  document.getElementById("detail-text").textContent = s.text;
  document.getElementById("detail-photo").textContent = "фото: " + s.title.toLowerCase();
  showScreen("screen-detail");
}

function submitForm(){
  const date = document.getElementById("f-date").value.trim();
  const people = document.getElementById("f-people").value.trim();
  const phone = document.getElementById("f-phone").value.trim();

  if (!date || !people || !phone){
    if (tg) tg.showAlert("Заповніть усі поля, будь ласка");
    else alert("Заповніть усі поля, будь ласка");
    return;
  }

  const payload = JSON.stringify({date, people, phone});

  if (tg){
    tg.sendData(payload);
    showScreen("screen-success");
    setTimeout(() => tg.close(), 1200);
  } else {
    console.log("Дані форми (без Telegram):", payload);
    showScreen("screen-success");
  }
}
</script>
</body>
</html>
